<!doctype html>
<html lang="en">

    <link

    <style>
      /* ===== EXACT SAME STYLES FROM DASHBOARD ===== */
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --red: #b71c1c;
        --red-mid: #c62828;
        --red-light: #ef5350;
        --bg: #f4f4f6;
        --white: #ffffff;

      }
      .logout-btn {

        display: flex;
        align-items: center;

      }
      .logout-btn button {
        background: rgba(255, 255, 255, 0.95);

        border-radius: 40px;
        display: flex;

      .logout-btn button:hover {

      }
      .logout-btn button i {

    <script>
      // ============================================
      // HELPER FUNCTION: Safely decode URL-encoded strings
      // ============================================
      function decodeIfNeeded(str) {
        if (!str || typeof str !== "string") return str;

        // If string contains %20 or other URL encoded characters, decode it
        if (str.includes("%")) {
          try {
            return decodeURIComponent(str);
          } catch (e) {
            console.warn("Failed to decode string:", str);
            return str;
          }
        }
        return str;
      }

      // ============================================
      // COOKIE FUNCTIONS
      // ============================================
      function getCookie(name) {
        const cookieName = name + "=";
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
          let cookie = cookies[i];
          while (cookie.charAt(0) == " ") cookie = cookie.substring(1);
          if (cookie.indexOf(cookieName) == 0) {
            try {
              return JSON.parse(
                cookie.substring(cookieName.length, cookie.length),
              );
            } catch {
              return cookie.substring(cookieName.length, cookie.length);
            }
          }
        }
        return null;
      }

      function getUserData() {
        return {
          userType: getCookie("user_type"),
          email: getCookie("user_email"),
          fullName: getCookie("full_name"),
        };
      }

      // ============================================
      // PERMISSION MANAGEMENT
      // ============================================
      function applyMenuPermissions(userType) {
        const dashboardLink = document.getElementById("dashboard-link");
        const surveysLink = document.getElementById("surveys-link");
        const createSurveyLink = document.getElementById("create-survey-link");
        const voterSurveyLink = document.getElementById("voter-survey-link");
        const responseLink = document.getElementById("response-link");
        const projectIdLink = document.getElementById("project-id-link");
        const usersLink = document.getElementById("users-link");

        console.log("Applying permissions for user type:", userType);

        const userTypeLower = userType ? userType.toLowerCase() : "";

        // Check user types
        const isSuperAdmin =
          userTypeLower.includes("super_admin") ||
          userTypeLower.includes("super admin") ||
          userTypeLower === "super_admin";

        const isAuthorized =
          userTypeLower.includes("authorized") ||
          userTypeLower === "authorized";

        const isGuest =
          userTypeLower.includes("guest") ||
          userTypeLower.includes("viewer") ||
          userTypeLower === "guest";

        if (isSuperAdmin || isAuthorized) {
          // Show all menus
          if (dashboardLink) dashboardLink.style.display = "block";
          if (surveysLink) surveysLink.style.display = "block";
          if (createSurveyLink) createSurveyLink.style.display = "block";
          if (voterSurveyLink) voterSurveyLink.style.display = "block";
          if (responseLink) responseLink.style.display = "block";
          if (projectIdLink) projectIdLink.style.display = "block";
          if (usersLink) usersLink.style.display = "block";

          console.log("Full permissions applied");
        } else if (isGuest) {
          // Guest: Only show Dashboard, Surveys, Response
          if (dashboardLink) dashboardLink.style.display = "block";
          if (surveysLink) surveysLink.style.display = "none";
          if (createSurveyLink) createSurveyLink.style.display = "none";
          if (voterSurveyLink) voterSurveyLink.style.display = "none";
          if (responseLink) responseLink.style.display = "block";
          if (projectIdLink) projectIdLink.style.display = "none";
          if (usersLink) usersLink.style.display = "none";

          console.log("Guest permissions applied");
        } else {
          // Default: Show all menus
          if (dashboardLink) dashboardLink.style.display = "block";
          if (surveysLink) surveysLink.style.display = "block";
          if (createSurveyLink) createSurveyLink.style.display = "block";
          if (voterSurveyLink) voterSurveyLink.style.display = "block";
          if (responseLink) responseLink.style.display = "block";
          if (projectIdLink) projectIdLink.style.display = "block";
          if (usersLink) usersLink.style.display = "block";

          console.log("Default permissions applied");
        }

        // Set active menu
        setActiveMenu();
      }

      // Set active menu based on current URL
      function setActiveMenu() {
        const currentPath = window.location.pathname;
        const menuItems = document.querySelectorAll("#full-menu li");

        // Remove active class from all menu items
        menuItems.forEach((item) => {
          item.classList.remove("active");
        });

        console.log("Setting active menu for path:", currentPath);

        menuItems.forEach((item) => {
          const link = item.querySelector("a");
          if (link) {
            const href = link.getAttribute("href");

            // For Response page (current page)
            if (
              currentPath.includes("/responses") ||
              currentPath.includes("responses")
            ) {
              if (href.includes("/responses") || href.includes("responses")) {
                item.classList.add("active");
                console.log("Active set on Response link");
              }
            }
            // For Dashboard page
            else if (
              currentPath.includes("/dashboard") ||
              currentPath.includes("dashboard")
            ) {
              if (href.includes("/dashboard") || href.includes("dashboard")) {
                item.classList.add("active");
              }
            }
            // For Surveys page
            else if (
              currentPath.includes("/survey-project-wise") ||
              currentPath.includes("surveys")
            ) {
              if (
                href.includes("/survey-project-wise") ||
                href.includes("surveys")
              ) {
                item.classList.add("active");
              }
            }
            // For Create Survey page
            else if (
              currentPath.includes("/create/survey") ||
              currentPath.includes("create-survey") ||
              currentPath.includes("create")
            ) {
              if (
                href.includes("/create/survey") ||
                href.includes("create-survey") ||
                href.includes("create")
              ) {
                item.classList.add("active");
              }
            }
            // For Project ID page
            else if (
              currentPath.includes("/project-id") ||
              currentPath.includes("project")
            ) {
              if (href.includes("/project-id") || href.includes("project")) {
                item.classList.add("active");
              }
            }
            // For Users page
            else if (
              currentPath.includes("/users") ||
              currentPath.includes("users")
            ) {
              if (href.includes("/users") || href.includes("users")) {
                item.classList.add("active");
              }
            }
          }
        });
      }

      // ============================================
      // API CONFIGURATION
      // ============================================
      const API_TOKEN = "405e0af40f3d04a:885b55cc21d37d2";
      const API_BASE_URL =
        "https://dev.leadtech.in/api/method/leadtech_survey.leadtech_survey.get_calling_survey_data_api1.get_doctype_data";

      // ============================================
      // APPLICATION STATE
      // ============================================
      let surveyData = null;

      // ============================================
      // INITIALIZATION
      // ============================================
      const userData = getUserData();
      console.log("User Data:", userData);

      if (!userData.userType || !userData.email) {
        document.getElementById("security").style.display = "flex";
        document.getElementById("to_show").style.display = "none";
      } else {
        document.getElementById("security").style.display = "none";
        document.getElementById("to_show").style.display = "block";

        // ===== FIXED: Decode user info in navbar =====
        const userNameSpan = document.getElementById("userName");
        const badgeSpan = document.getElementById("userTypeBadge");

        // Decode user name properly (handles %20 and other encoded characters)
        if (userNameSpan) {
          let displayName = userData.fullName || userData.email || "User";
          displayName = decodeIfNeeded(displayName);
          userNameSpan.textContent = displayName;
        }

        // Decode user type and format it nicely
        if (badgeSpan) {
          let userTypeDisplay = decodeIfNeeded(userData.userType || "");
          userTypeDisplay = userTypeDisplay.replace(/_/g, " ").toUpperCase();
          badgeSpan.textContent = userTypeDisplay;
        }

        // Apply menu permissions
        applyMenuPermissions(userData.userType);

        // ============================================
        // FETCH DOCTYPE FROM URL (doctype_name parameter)
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        let doctypeFromUrl = urlParams.get("doctype_name");

        // If no doctype in URL, fallback to a default
        if (!doctypeFromUrl) {
          doctypeFromUrl = "Survey_Mandia";
          console.warn(
            "doctype_name not found in URL, using fallback: Survey_Mandia",
          );
        }

        const surveyName = doctypeFromUrl;
        // Decode survey name if it contains encoded characters
        const decodedSurveyName = decodeIfNeeded(surveyName);
        document.getElementById("pageTitle").textContent =
          `Survey Reports: ${decodedSurveyName}`;

        // Show loader and call API immediately (no filters)
        loadData(surveyName);
      }

      // ============================================
      // DATA LOADING (loader visible)
      // ============================================
      async function loadData(survey) {
        const grid = document.getElementById("analyticsGrid");

        // Show loader
        grid.innerHTML =
          '<div class="loader-wrap"><div class="spinner"></div></div>';

        try {
          // Build URL with no filters (all empty)
          let url = `${API_BASE_URL}?doctype=${encodeURIComponent(survey)}&fields=[]&field_type=&field_value=&sub_field_type=&sub_field_value=&page=1&page_size=1000`;

          console.log("Fetching:", url);

          const response = await fetch(url, {
            method: "GET",
            headers: {
              Authorization: `Token ${API_TOKEN}`,
              "Content-Type": "application/json",
            },
          });

          const data = await response.json();
          console.log("API Response:", data);

          surveyData = data.message;

          if (!surveyData || surveyData.status !== "success") {
            throw new Error(surveyData?.message || "API returned error");
          }

          // Display cards if data exists
          if (surveyData.data && surveyData.data.length > 0) {
            renderCards(surveyData.data);
            document.getElementById("responseCount").textContent =
              `Total: ${surveyData.total}`;
            document.getElementById("responseCount").style.display =
              "inline-block";
          } else {
            grid.innerHTML =
              '<div class="empty-state"><i class="fas fa-inbox"></i><p>No data found</p></div>';
            document.getElementById("responseCount").style.display = "none";
          }
        } catch (error) {
          console.error("Error:", error);
          grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Error: ${error.message}</p></div>`;
        }
      }

      function renderCards(data) {
        const grid = document.getElementById("analyticsGrid");
        grid.innerHTML = "";

        const fields = surveyData.fields_meta || [];
        const totalRecords = data.length;

        fields.forEach((field) => {
          const counts = {};
          data.forEach((item) => {
            let val = item[field.fieldname];
            if (val === null || val === undefined) val = "N/A";
            // Decode any URL-encoded values in the data
            if (typeof val === "string" && val.includes("%")) {
              try {
                val = decodeURIComponent(val);
              } catch (e) {
                // Keep original if decoding fails
              }
            }
            counts[val] = (counts[val] || 0) + 1;
          });

          const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
          const totalForField = sorted.reduce(
            (sum, [_, count]) => sum + count,
            0,
          );

          grid.appendChild(
            createCard(
              field.label,
              field.fieldname,
              sorted,
              totalForField,
              totalRecords,
            ),
          );
        });
      }

      function createCard(label, fieldname, sorted, total, allCount) {
        const card = document.createElement("div");
        card.className = "q-card";

        card.innerHTML = `
                <div class="q-card-header">
                    <h3 title="${label}">${label}</h3>
                    <span class="q-total">${total} answers</span>
                </div>
                <div class="q-card-body">
                    <div class="q-sticky-top">
                        <select class="answer-select" id="select-${fieldname}">
                            <option value="">— Select an answer to see count —</option>
                            ${sorted
                              .map(([val, cnt]) => {
                                const pct = ((cnt / allCount) * 100).toFixed(1);
                                // Ensure values are properly displayed (they're already decoded)
                                return `<option value="${val.replace(/"/g, "&quot;")}" data-count="${cnt}" data-pct="${pct}">${val}</option>`;
                              })
                              .join("")}
                        </select>
                        <div class="count-display" id="cd-${fieldname}">
                            <div class="count-number" id="cn-${fieldname}">0</div>
                            <div class="count-label">responses for selected answer</div>
                            <span class="count-percentage" id="cp-${fieldname}">0%</span>
                        </div>
                    </div>
                    <div class="answers-list">
                        ${sorted
                          .map(([val, cnt]) => {
                            const maxCount = sorted.length ? sorted[0][1] : 1;
                            const barPct = (cnt / maxCount) * 100;
                            return `
                                <div class="answer-row">
                                    <span class="answer-label" title="${val.replace(/"/g, "&quot;")}">${val}</span>
                                    <div class="answer-bar-wrap"><div class="answer-bar" style="width:${barPct}%"></div></div>
                                    <span class="answer-count">${cnt}</span>
                                </div>
                            `;
                          })
                          .join("")}
                    </div>
                </div>
            `;

        setTimeout(() => {
          const select = document.getElementById(`select-${fieldname}`);
          if (select) {
            select.addEventListener("change", function () {
              const cd = document.getElementById(`cd-${fieldname}`);
              if (!this.value) {
                cd.classList.remove("show");
                return;
              }
              const opt = this.options[this.selectedIndex];
              document.getElementById(`cn-${fieldname}`).textContent =
                opt.dataset.count;
              document.getElementById(`cp-${fieldname}`).textContent =
                opt.dataset.pct + "%";
              cd.classList.add("show");
            });
          }
        }, 20);

        return card;
      }

      // Sidebar toggle
      document
        .getElementById("toggleButton")
        .addEventListener("click", function () {
          const sidebar = document.getElementById("sidebar");
          const mainContent = document.getElementById("mainContent");
          const logo = document.getElementById("logo");
          const logo1 = document.getElementById("logo1");

          sidebar.classList.toggle("collapsed");

          if (sidebar.classList.contains("collapsed")) {
            mainContent.style.marginLeft = "80px";
            logo.style.display = "none";
            logo1.style.display = "block";
          } else {
            mainContent.style.marginLeft = "280px";
            logo.style.display = "block";
            logo1.style.display = "none";
          }
        });

      window.closeAlert = function () {
        document.getElementById("alertBox").classList.remove("show");
      };

      window.logout = function () {
        window.location.href = "https://dev.leadtech.in/survey/login-test";
      };
    </script>
  </body>
